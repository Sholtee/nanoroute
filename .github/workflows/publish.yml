#############################################################################
name: Publish NuGet package

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Project"
        required: true

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  POWERSHELL_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Create NuGet package
        shell: pwsh
        run: ./Scripts/Create-NuGetPackages.ps1 "${{ inputs.project }}"

      - name: Publish NuGet package
        shell: pwsh
        run: |
          if (@(Get-ChildItem -Path ./Artifacts/NuGet -File -Filter *.nupkg).Length -ne 1) { throw "Expected exactly one package" }

          foreach ($package in (Get-ChildItem -Path ./Artifacts/NuGet -File | Where-Object { $_.Extension -in @(".nupkg", ".snupkg") })) {
            dotnet nuget push $package.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
            if (!$?) { throw "Package publishing failed: $($package.Name)" }
          }

      - name: Push git tag
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem -Path ./Artifacts/NuGet -File -Filter *.nupkg)
          if ($packages.Length -ne 1) { throw "Expected exactly one package but found $($packages.Length)" }

          $tag = [System.IO.Path]::GetFileNameWithoutExtension($packages[0].Name)

          git config --global user.name "github-actions[bot]"
          if (!$?) { throw "Failed to configure git user name" }

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if (!$?) { throw "Failed to configure git user email" }

          git tag $tag
          if (!$?) { throw "Failed to create git tag: $tag" }

          git push origin $tag
          if (!$?) { throw "Failed to push git tag: $tag" }
