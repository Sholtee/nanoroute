name: Performance test

on:
  workflow_dispatch:
    inputs:
      filter:
        description: "Filter"
        required: true
        default: "*"
      publish-artifacts:
        description: "Publish artifacts?"
        required: true
        default: false
        type: boolean

permissions:
  contents: write 

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  POWERSHELL_TELEMETRY_OPTOUT: true

jobs:
  perf-tests:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Run tests
        shell: pwsh
        run: ./Scripts/Run-PerfTests.ps1 "${{ inputs.filter }}"

      - name: Upload artifacts to gh-pages
        shell: pwsh
        if: ${{ inputs.publish-artifacts }}
        run: |
          ./Scripts/Update-GitHubPages.ps1 {
            param($ROOT, $GH_PAGES)

            Remove-Item -Path (Join-Path $GH_PAGES "Benchmarks") -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -Path (Join-Path $GH_PAGES "Benchmarks") -ItemType Directory -Force
            Copy-Item (Join-Path $ROOT "Artifacts/BenchmarkDotNet/results/*.md") (Join-Path $GH_PAGES "Benchmarks") -Force
          } "${{ secrets.GITHUB_TOKEN }}"
